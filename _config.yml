title: "EnStory — The Story of English Words"
description: "探索英语单词的起源、历史沿革与文化背景，了解每个单词背后的故事。"
url: "https://tsincy-peacy.github.io"
baseurl: "/EnStory"

# 作者信息
author:
  name: "张逸安"

# 构建设置
markdown: kramdown
highlighter: rouge

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/
